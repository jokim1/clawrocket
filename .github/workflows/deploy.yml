name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    runs-on: [self-hosted, Linux, X64, alienware-prod]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Deploy on self-hosted production runner
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_SERVICE: ${{ vars.DEPLOY_SERVICE }}
          DEPLOY_WAIT_SECONDS: ${{ vars.DEPLOY_WAIT_SECONDS }}
          DEPLOY_HEALTH_INTERVAL: ${{ vars.DEPLOY_HEALTH_INTERVAL }}
          DEPLOY_HEALTH_CONNECT_TIMEOUT: ${{ vars.DEPLOY_HEALTH_CONNECT_TIMEOUT }}
          DEPLOY_HEALTH_MAX_TIME: ${{ vars.DEPLOY_HEALTH_MAX_TIME }}
          MAIN_SUBSCRIPTION_WARM_WORKER_ENABLED: ${{ vars.MAIN_SUBSCRIPTION_WARM_WORKER_ENABLED }}
        run: |
          set -euo pipefail
          deploy_path="${DEPLOY_PATH:-/home/k1min8r/projects/clawrocket}"
          deploy_service="${DEPLOY_SERVICE:-nanoclaw}"

          DEPLOY_PATH="$deploy_path" \
          DEPLOY_SERVICE="$deploy_service" \
          DEPLOY_BRANCH="main" \
          bash ops/deploy-production.sh
