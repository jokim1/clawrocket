name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    runs-on: [self-hosted, Linux, X64, alienware-prod]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Deploy on self-hosted production runner
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_SERVICE: ${{ vars.DEPLOY_SERVICE }}
        run: |
          set -euo pipefail
          deploy_path="${DEPLOY_PATH:-/home/k1min8r/projects/clawrocket}"
          deploy_service="${DEPLOY_SERVICE:-nanoclaw}"

          DEPLOY_PATH="$deploy_path" \
          DEPLOY_SERVICE="$deploy_service" \
          DEPLOY_BRANCH="main" \
          bash ops/deploy-production.sh
